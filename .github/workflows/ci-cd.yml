name: CI/CD — Expense Tracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. BUILD & TEST ───────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-cuarto-proyecto
          push: false
          tags: expense-tracker-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-cuarto-proyecto
          push: false
          tags: expense-tracker-frontend:test
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. PUSH A DOCKER HUB (solo en main) ──────────────────
  push:
    name: Push a Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push imagen backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-cuarto-proyecto
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-cuarto-proyecto
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-frontend:${{ github.sha }}
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
