version: '3.8'

services:
  # BASE DE DATOS (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-proyecto_final}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-expense_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. BACKEND (Node.js con Express)
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${DB_USER:-proyecto_final}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-expense_tracker}
      JWT_SECRET: ${JWT_SECRET:-clave_secreta_para_proyecto_final123}

  # 3. FRONTEND (Vite con React)
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:80" # Puerto por defecto de Vite
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
      - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN:-dev-mz3fzzdfq0lxvcto.us.auth0.com}
      - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID:-wzvvWLW6WXMaRqoEnV578DoWLArICFJO}

volumes:
  postgres_data: